version: "3.9"

services:

  # ── BOT RUNNER ─────────────────────────────────────────────────────────────
  # Runs all active bots as threads. One container for now; scale later.
  bots:
    build: .
    command: python -m bots.registry
    env_file: .env
    volumes:
      - polyfarm_data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── DB INIT (runs once at startup, then exits) ────────────────────────────
  db_init:
    build: .
    command: python scripts/setup_db.py
    env_file: .env
    volumes:
      - polyfarm_data:/app/data

volumes:
  polyfarm_data:
    # Named volume — persists the SQLite database across container restarts
    # On Hetzner: stored in /var/lib/docker/volumes/polyfarm_polyfarm_data/
