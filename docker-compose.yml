version: "3.9"

services:

  # ── DB INIT (runs once at startup, then exits) ────────────────────────────
  db_init:
    build: .
    command: python scripts/setup_db.py
    env_file: .env
    volumes:
      - polyfarm_data:/app/data

  # ── BOT RUNNER ────────────────────────────────────────────────────────────
  bots:
    build: .
    command: python -m bots.registry
    env_file: .env
    volumes:
      - polyfarm_data:/app/data
    restart: unless-stopped
    depends_on:
      db_init:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── DASHBOARD ─────────────────────────────────────────────────────────────
  dashboard:
    build: .
    command: python services/dashboard/app.py
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - polyfarm_data:/app/data
    restart: unless-stopped
    depends_on:
      db_init:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  polyfarm_data:
